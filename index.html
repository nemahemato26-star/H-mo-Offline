<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hémo-Offline | خريطة المصلحة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; }
        .header { background: #2c3e50; color: white; padding: 15px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .ward-map { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .room { background: white; border-radius: 10px; padding: 15px; border-top: 6px solid #3498db; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .room-title { font-weight: bold; font-size: 1.1em; color: #2980b9; margin-bottom: 12px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .beds-container { display: flex; gap: 10px; }
        .bed { flex: 1; background: #f9f9f9; border: 1px solid #dcdde1; padding: 10px; border-radius: 8px; text-align: center; }
        .bed-icon { font-size: 24px; display: block; margin-bottom: 5px; }
        .patient-name { font-weight: bold; color: #2c3e50; font-size: 0.9em; }
        .btn-pass { display: block; width: 100%; margin-top: 20px; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1em; }
    </style>
</head>
<body>

    <div class="header">
        <h2>مصلحة أمراض وسرطان الدم</h2>
        <small>نظام Hémo-Offline لإدارة المناوبات</small>
    </div>

    <div class="ward-map" id="wardMap">
        </div>

    <button class="btn-pass" onclick="alert('سيتم فتح نموذج SBAR قريباً')">تسجيل تسليم المناوبة (Passation)</button>

    <script>
        const mapContainer = document.getElementById('wardMap');
        for(let i=1; i<=6; i++) {
            mapContainer.innerHTML += `
                <div class="room">
                    <span class="room-title">الغرفة ${i}</span>
                    <div class="beds-container">
                        <div class="bed"><span class="bed-icon">🛏️</span><span class="patient-name">سرير A</span></div>
                        <div class="bed"><span class="bed-icon">🛏️</span><span class="patient-name">سرير B</span></div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
